services:
  - type: web
    name: darjeeling-momos-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL_PASSWORD
        sync: false

  - type: web
    name: darjeeling-momos-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: darjeeling-momos-server
          property: host
        # VITE_API_URL should be the full string with /api eg: https://your-server-url.onrender.com/api
        # Since 'host' property just gives the domain, we append /api in code or the user sets it manually. 
        # Actually it's better to just prompt the user to configure VITE_API_URL manually.
